  <head>
    <title>RoughJS sample</title>
    <script src="https://unpkg.com/roughjs@latest/bundled/rough.js"></script>
    <style>
      svg {
        overflow: visible;
      }
    </style>
  </head>

  <body>
    <svg id="svg"></svg>

    <script>
      const svg = document.getElementById("svg");
      const rc = rough.svg(svg);

      const elements = [];

      const fix = 10;

      const labels = [
        "Jan",
        "Feb",
        "Mär",
        "Apr",
        "Mai",
        "Jun",
        "Jul",
        "Aug",
        "Sep",
        "Okt",
        "Nov",
        "Dez",
      ];

      const marker = {
        2: {
          8: true,
        },
        3: {
          15: true,
        },
        4: {
          5: true,
        },
        5: {
          10: true,
          11: true,
          17: true,
        },
      };

      const getDayIndex = (date) => (date.getDay() || 7) - 1;

      svg.setAttribute("width", fix * 36 + 25);
      svg.setAttribute("height", fix * 12 + 25);

      const label = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "text",
      );
      label.appendChild(document.createTextNode("Feuerwehr-Wettkämpfe 2025"));
      label.setAttribute("x", "50%");
      label.setAttribute("y", "10");
      label.setAttribute("font-size", "14");
      label.setAttribute("dominant-baseline", "middle");
      label.setAttribute("text-anchor", "middle");
      elements.push(label);

      for (const m of Array(12).keys()) {
        const label = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "text",
        );
        label.appendChild(document.createTextNode(labels[m]));
        label.setAttribute("x", "0");
        label.setAttribute("y", 25 + m * 10 + 5 + m * 5);
        label.setAttribute("font-size", "10");
        label.setAttribute("dominant-baseline", "middle");
        elements.push(label);

        const firstOfMonthIndex = getDayIndex(new Date(2025, m, 1));

        for (const d of Array(36).keys()) {
          const date = new Date(2025, m, d + 1 - firstOfMonthIndex);
          console.log({ m, d, month: date.getMonth(), date });

          let strokeOpacity = 0;
          const options = {};

          if (m == date.getMonth()) {
            strokeOpacity = 0.1;

            if ([5, 6].indexOf(getDayIndex(date)) >= 0) {
              strokeOpacity = 0.35;
            }

            if ((marker[date.getMonth() + 1] ?? {})[date.getDate()]) {
              options.fill = "rgba(0, 180, 0, 1)";
              options.fillStyle = "cross-hatch";
              options.fillWeight = 1;
            }
          }

          elements.push(
            rc.rectangle(
              /* x */ 25 + d * fix,
              /* y */ 25 + m * fix + m * 5,
              /* w */ fix,
              /* h */ fix,
              {
                ...options,
                stroke: "rgba(0, 0, 0, " + strokeOpacity + ")",
                //stroke: d > firstOfMonthIndex ? "black": "rgba(0, 0, 0, 0.1)",
                //stroke: 'rgba(0, 0, 0, ' + ( d % 10 == 0 ? 1 : 0.1 ) + ')',
                //fill: (marker[m+1] ?? {})[d] ? 'rgba(255, 0, 0, 1)' : null
              },
            ),
          );
          //rc.rectangle(30, 10, 10, 10, {       fill: 'rgba(255,0,0,0.2)', fillStyle: 'solid',  }),
        }
      }

      elements.forEach((elem) => svg.appendChild(elem));
